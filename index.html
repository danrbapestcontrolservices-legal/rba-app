<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>RBA HR Portal</title>
  <link rel="manifest" href="manifest.json">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">

  <div class="bg-white rounded-xl shadow-2xl w-full max-w-md p-6 text-center border-t-8 border-blue-900">
    
    <div class="mb-6">
      <img src="https://i.ibb.co/bj5t74dq/rba-logo.avif" alt="RBA Logo" class="h-24 mx-auto object-contain mb-4">
      <h1 class="text-2xl font-extrabold text-blue-900 tracking-tight leading-none">RBA PEST CONTROL</h1>
      <h2 class="text-sm font-bold text-gray-700 tracking-widest mt-1">& WATERPROOFING SERVICES</h2>
      <div class="mt-3 inline-block bg-blue-100 text-blue-800 text-xs px-3 py-1 rounded-full font-bold uppercase tracking-widest">
        Employee HR Portal
      </div>
    </div>

    <div id="loginView">
      <input type="text" id="empId" class="w-full border-2 border-gray-300 p-4 rounded-lg uppercase font-bold text-center focus:border-blue-900 focus:ring-0" placeholder="ENTER EMPLOYEE ID">
      <button onclick="sendOTP()" class="mt-4 w-full bg-blue-900 text-white font-bold py-4 rounded-lg shadow-lg hover:bg-blue-800" id="btnSend">SEND SMS CODE</button>
    </div>

    <div id="otpView" class="hidden">
      <p class="text-sm text-gray-500 mb-2 font-bold">We sent a secure code to your phone.</p>
      <input type="number" id="otpCode" class="w-full border-2 border-gray-300 p-4 rounded-lg text-center tracking-widest text-3xl font-bold focus:border-blue-900 focus:ring-0" placeholder="------">
      <button onclick="verifyOTP()" class="mt-4 w-full bg-green-600 text-white font-bold py-4 rounded-lg shadow-lg hover:bg-green-700" id="btnVerify">VERIFY IDENTITY</button>
    </div>

    <div id="cameraView" class="hidden">
      <div class="bg-yellow-50 text-yellow-800 text-xs font-bold p-2 rounded mb-3 border border-yellow-200">
        GPS & CAMERA REQUIRED FOR PAYROLL LOG
      </div>
      <video id="videoElement" autoplay playsinline class="w-full rounded-lg bg-black border-4 border-gray-200 shadow-inner"></video>
      <canvas id="canvas" class="hidden"></canvas>
      <p id="gpsText" class="text-gray-500 mt-2 font-bold animate-pulse">Waiting for GPS Signal...</p>
      
      <div class="flex gap-4 mt-4">
        <button onclick="logTime('TIME IN')" class="flex-1 bg-green-500 text-white font-bold py-4 rounded-lg shadow-lg disabled:opacity-50" id="btnIn" disabled>TIME IN</button>
        <button onclick="logTime('TIME OUT')" class="flex-1 bg-red-500 text-white font-bold py-4 rounded-lg shadow-lg disabled:opacity-50" id="btnOut" disabled>TIME OUT</button>
      </div>
    </div>
  </div>

  <script>
    // PASTE YOUR NEW GOOGLE SCRIPT DEPLOYMENT URL BELOW
    const API_URL = "https://script.google.com/macros/s/AKfycbx7FZxdQsmhchnA5vvM-geI50q_x2kjgN7oZPjG9HAP3HQH0rCWp_c9gmYLz5-ljCyPpg/exec"; 

    let empId = "", lat = null, lng = null;

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }

    async function sendDataToGoogle(data) {
      try {
        const response = await fetch(API_URL, { 
          method: 'POST', 
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          redirect: 'follow',
          body: JSON.stringify(data) 
        });
        return await response.json();
      } catch (error) {
        return { success: false, message: "Network Error. Please check your internet connection." };
      }
    }

    function sendOTP() {
      empId = document.getElementById('empId').value.trim().toUpperCase();
      if (!empId) return alert("Enter Employee ID");
      document.getElementById('btnSend').innerText = "SENDING SMS...";
      document.getElementById('btnSend').disabled = true;
      
      sendDataToGoogle({ action: 'SEND_OTP', empId: empId }).then(res => {
        if (res.success) {
          document.getElementById('loginView').classList.add('hidden');
          document.getElementById('otpView').classList.remove('hidden');
        } else {
          alert(res.message || "ID not found in RBA Database.");
          document.getElementById('btnSend').innerText = "SEND SMS CODE";
          document.getElementById('btnSend').disabled = false;
        }
      });
    }

    function verifyOTP() {
      // .trim() prevents the "Wrong Code" space error
      const otp = document.getElementById('otpCode').value.trim(); 
      document.getElementById('btnVerify').innerText = "CHECKING...";
      document.getElementById('btnVerify').disabled = true;
      
      sendDataToGoogle({ action: 'VERIFY_OTP', empId: empId, otp: otp }).then(res => {
        if (res.success) {
          startApp();
        } else {
          alert("Wrong Code. Try again.");
          document.getElementById('btnVerify').innerText = "VERIFY IDENTITY";
          document.getElementById('btnVerify').disabled = false;
        }
      });
    }

    function startApp() {
      document.getElementById('otpView').classList.add('hidden');
      document.getElementById('cameraView').classList.remove('hidden');

      navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
        .then(stream => document.getElementById('videoElement').srcObject = stream)
        .catch(err => alert("Camera permission denied."));

      navigator.geolocation.getCurrentPosition(pos => {
        lat = pos.coords.latitude; lng = pos.coords.longitude;
        document.getElementById('gpsText').innerText = "✓ GPS LOCKED";
        document.getElementById('gpsText').style.color = "#16a34a";
        document.getElementById('gpsText').classList.remove("animate-pulse");
        document.getElementById('btnIn').disabled = false;
        document.getElementById('btnOut').disabled = false;
      }, err => alert("Please turn on your phone's Location/GPS!"), { enableHighAccuracy: true });
    }

    function logTime(type) {
      document.getElementById('btnIn').disabled = true; document.getElementById('btnOut').disabled = true;
      
      const video = document.getElementById('videoElement');
      const canvas = document.getElementById('canvas');
      canvas.width = video.videoWidth; canvas.height = video.videoHeight;
      canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
      const img = canvas.toDataURL('image/jpeg', 0.6);

      sendDataToGoogle({ action: 'LOG_TIME', empId: empId, type: type, lat: lat, lng: lng, image: img })
        .then(res => {
          if (res.success) {
            document.getElementById('cameraView').innerHTML = `
              <div class="py-8">
                <h2 class="text-3xl text-green-600 font-extrabold mb-2">${type} LOGGED!</h2>
                <p class="text-gray-600 font-bold text-sm">Attendance saved securely.</p>
                <button onclick="location.reload()" class="mt-8 bg-gray-200 text-gray-800 font-bold py-3 px-8 rounded-lg shadow hover:bg-gray-300">CLOSE PORTAL</button>
              </div>`;
          } else {
            alert("Error saving data. Please try again.");
            location.reload();
          }
        });
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>RBA Core HR</title>
  <link rel="manifest" href="manifest.json">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Enterprise App Smooth Animations */
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    .fade-in { animation: fadeIn 0.4s ease-in-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
  </style>
</head>
<body class="bg-slate-100 flex items-center justify-center min-h-screen p-4 sm:p-8">

  <!-- MAIN APP CONTAINER -->
  <div class="glass-card rounded-2xl shadow-2xl w-full max-w-lg p-6 sm:p-8 text-center border-t-[10px] border-blue-900 fade-in">
    
    <!-- BRANDING -->
    <div class="mb-8">
      <img src="https://i.ibb.co/bj5t74dq/rba-logo.avif" alt="RBA Logo" class="h-24 sm:h-28 mx-auto object-contain mb-4 drop-shadow-md">
      <h1 class="text-3xl font-extrabold text-slate-800 tracking-tight leading-none">RBA PEST CONTROL</h1>
      <h2 class="text-xs font-bold text-slate-500 tracking-[0.2em] mt-2 uppercase">& Waterproofing Services</h2>
    </div>

    <!-- VIEW 1: IDENTITY (LOGIN) -->
    <div id="loginView" class="fade-in">
      <div class="relative">
        <input type="text" id="empId" class="w-full bg-slate-50 border-2 border-slate-200 p-4 rounded-xl uppercase font-black text-center text-xl text-slate-700 focus:border-blue-700 focus:ring-0 transition-all placeholder-slate-400" placeholder="EMPLOYEE ID">
      </div>
      <button onclick="sendOTP()" class="mt-4 w-full bg-blue-900 text-white font-bold py-4 rounded-xl shadow-[0_8px_15px_rgba(30,58,138,0.2)] hover:bg-blue-800 hover:-translate-y-0.5 transition-all flex justify-center items-center gap-2" id="btnSend">
        SECURE LOGIN
      </button>
    </div>

    <!-- VIEW 2: AUTHENTICATION (OTP) -->
    <div id="otpView" class="hidden fade-in">
      <div class="bg-blue-50 text-blue-800 text-sm font-semibold p-3 rounded-lg mb-4 border border-blue-100">
        Authentication code sent via SMS.
      </div>
      <input type="number" id="otpCode" class="w-full bg-slate-50 border-2 border-slate-200 p-4 rounded-xl text-center tracking-[0.5em] text-3xl font-black text-slate-800 focus:border-blue-700 focus:ring-0 transition-all" placeholder="••••••">
      <button onclick="verifyOTP()" class="mt-4 w-full bg-emerald-600 text-white font-bold py-4 rounded-xl shadow-[0_8px_15px_rgba(5,150,105,0.2)] hover:bg-emerald-700 hover:-translate-y-0.5 transition-all" id="btnVerify">
        VERIFY IDENTITY
      </button>
    </div>

    <!-- VIEW 3: FIELD TERMINAL (CAMERA) -->
    <div id="cameraView" class="hidden fade-in">
      <div class="flex items-center justify-center gap-2 bg-amber-50 text-amber-800 text-xs font-bold p-3 rounded-lg mb-4 border border-amber-200">
        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M5.05 4.05a7 7 0 119.9 9.9L10 18.9l-4.95-4.95a7 7 0 010-9.9zM10 11a2 2 0 100-4 2 2 0 000 4z" clip-rule="evenodd"></path></svg>
        BIOMETRIC & GPS TERMINAL ACTIVE
      </div>
      
      <div class="relative rounded-xl overflow-hidden shadow-inner border-4 border-slate-200 bg-black">
        <video id="videoElement" autoplay playsinline class="w-full object-cover aspect-square sm:aspect-video opacity-90"></video>
        <canvas id="canvas" class="hidden"></canvas>
      </div>
      
      <p id="gpsText" class="text-slate-500 mt-3 font-bold text-sm flex items-center justify-center gap-2 animate-pulse">
        <svg class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
        Acquiring Satellite Signal...
      </p>
      
      <div class="flex gap-4 mt-6">
        <button onclick="logTime('TIME IN')" class="flex-1 bg-emerald-500 text-white font-black py-5 rounded-xl shadow-lg disabled:opacity-25 disabled:cursor-not-allowed transition-all" id="btnIn" disabled>TIME IN</button>
        <button onclick="logTime('TIME OUT')" class="flex-1 bg-rose-500 text-white font-black py-5 rounded-xl shadow-lg disabled:opacity-25 disabled:cursor-not-allowed transition-all" id="btnOut" disabled>TIME OUT</button>
      </div>
    </div>

    <!-- VIEW 4: HR ADMIN DASHBOARD -->
    <div id="adminView" class="hidden fade-in text-left">
      <div class="flex justify-between items-end border-b-2 border-slate-200 pb-3 mb-4">
        <div>
          <h3 class="text-2xl font-black text-slate-800">Admin Control</h3>
          <p class="text-xs font-bold text-slate-500 uppercase tracking-wider">Payroll Approvals</p>
        </div>
        <button onclick="location.reload()" class="text-xs font-bold bg-slate-200 text-slate-700 px-3 py-2 rounded-lg hover:bg-slate-300">LOGOUT</button>
      </div>
      
      <div id="adminLogs" class="space-y-4 max-h-[60vh] overflow-y-auto pr-2 pb-4 scrollbar-thin">
        <div class="flex justify-center items-center py-10">
           <svg class="w-8 h-8 animate-spin text-blue-900" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
        </div>
      </div>
    </div>

  </div>

  <script>
    // ==========================================
    // PASTE YOUR NEW GOOGLE DEPLOYMENT URL BELOW
    // ==========================================
    const API_URL = "https://script.google.com/macros/s/AKfycbxrmJlPhGTxFZoCf-JCTX63YgJEm1ECkriZQYIfqffyz2JM3sZ9YNUMdvk9tooobwYpFA/exec"; 

    let empId = "", lat = null, lng = null;

    if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }

    // Core Fetch Protocol
    async function sendDataToGoogle(data) {
      try {
        const response = await fetch(API_URL, { 
          method: 'POST', 
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          redirect: 'follow', body: JSON.stringify(data) 
        });
        return await response.json();
      } catch (error) {
        return { success: false, message: "Network Timeout. Please check data connection." };
      }
    }

    // Auth Step 1
    function sendOTP() {
      empId = document.getElementById('empId').value.trim().toUpperCase();
      if (!empId) return;
      
      const btn = document.getElementById('btnSend');
      btn.innerHTML = `<svg class="w-5 h-5 animate-spin mx-auto" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>`;
      btn.disabled = true;
      
      sendDataToGoogle({ action: 'SEND_OTP', empId: empId }).then(res => {
        if (res.success) {
          document.getElementById('loginView').classList.add('hidden');
          document.getElementById('otpView').classList.remove('hidden');
        } else {
          alert(res.message);
          btn.innerHTML = "SECURE LOGIN";
          btn.disabled = false;
        }
      });
    }

    // Auth Step 2
    function verifyOTP() {
      const otp = document.getElementById('otpCode').value.trim(); 
      if(!otp) return;

      const btn = document.getElementById('btnVerify');
      btn.innerText = "AUTHENTICATING...";
      btn.disabled = true;
      
      sendDataToGoogle({ action: 'VERIFY_OTP', empId: empId, otp: otp }).then(res => {
        if (res.success) {
          if (res.role === 'ADMIN') {
            document.getElementById('otpView').classList.add('hidden');
            document.getElementById('adminView').classList.remove('hidden');
            fetchAdminLogs();
          } else {
            startApp(res.timeInDisabled, res.timeOutDisabled);
          }
        } else {
          alert("Invalid Verification Code.");
          btn.innerText = "VERIFY IDENTITY";
          btn.disabled = false;
        }
      });
    }

    // Hardware Initialization (Camera + GPS)
    function startApp(timeInDisabled, timeOutDisabled) {
      document.getElementById('otpView').classList.add('hidden');
      document.getElementById('cameraView').classList.remove('hidden');

      navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
        .then(stream => {
          const video = document.getElementById('videoElement');
          video.srcObject = stream;
        })
        .catch(err => alert("System Error: Camera access denied."));

      navigator.geolocation.getCurrentPosition(pos => {
        lat = pos.coords.latitude; lng = pos.coords.longitude;
        
        const gpsEl = document.getElementById('gpsText');
        gpsEl.innerHTML = `✓ LOCATION ACQUIRED <span class="text-xs font-normal">(${lat.toFixed(4)}, ${lng.toFixed(4)})</span>`;
        gpsEl.className = "text-emerald-600 mt-3 font-bold text-sm flex items-center justify-center gap-2";
        
        if (!timeInDisabled) document.getElementById('btnIn').disabled = false;
        if (!timeOutDisabled) document.getElementById('btnOut').disabled = false;
        
        if (timeInDisabled && timeOutDisabled) {
          gpsEl.innerHTML = "✓ SHIFT COMPLETED FOR TODAY";
          gpsEl.className = "text-slate-500 mt-3 font-bold text-sm flex items-center justify-center gap-2";
        }
      }, err => alert("System Error: Please enable device location services."), { enableHighAccuracy: true });
    }

    // Data Submission
    function logTime(type) {
      document.getElementById('btnIn').disabled = true; 
      document.getElementById('btnOut').disabled = true;
      document.getElementById('gpsText').innerHTML = "Uploading encrypted payload...";
      
      const video = document.getElementById('videoElement');
      const canvas = document.getElementById('canvas');
      canvas.width = video.videoWidth; canvas.height = video.videoHeight;
      canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
      const img = canvas.toDataURL('image/jpeg', 0.5); // High compression for field speeds

      sendDataToGoogle({ action: 'LOG_TIME', empId: empId, type: type, lat: lat, lng: lng, image: img })
        .then(res => {
          if (res.success) {
            document.getElementById('cameraView').innerHTML = `
              <div class="py-10 fade-in">
                <div class="mx-auto flex items-center justify-center h-16 w-16 rounded-full bg-emerald-100 mb-4">
                  <svg class="h-8 w-8 text-emerald-600" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                </div>
                <h2 class="text-3xl text-slate-800 font-black mb-2">${type} LOGGED</h2>
                <p class="text-slate-500 font-semibold text-sm">Synchronized with RBA Cloud.</p>
                <button onclick="location.reload()" class="mt-8 bg-slate-200 text-slate-700 font-bold py-4 px-10 rounded-xl hover:bg-slate-300 transition-all">EXIT TERMINAL</button>
              </div>`;
          } else { 
            alert("Database write failure."); 
            location.reload(); 
          }
        });
    }

    // ==========================================
    // ADMIN DASHBOARD UX LOGIC
    // ==========================================
    function fetchAdminLogs() {
      sendDataToGoogle({ action: 'GET_LOGS' }).then(res => {
        const container = document.getElementById('adminLogs');
        container.innerHTML = ""; 
        
        if (!res.logs || res.logs.length === 0) {
          container.innerHTML = `
            <div class="text-center py-10 fade-in">
              <svg class="mx-auto h-12 w-12 text-slate-300 mb-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
              <p class="text-slate-500 font-bold">Queue is empty. No pending approvals.</p>
            </div>`;
          return;
        }

        res.logs.forEach(log => {
          const actionColor = log.action === 'TIME IN' ? 'bg-emerald-100 text-emerald-800' : 'bg-rose-100 text-rose-800';
          const card = document.createElement('div');
          card.className = "bg-white p-4 border-2 border-slate-100 rounded-xl shadow-sm mb-3 fade-in";
          card.innerHTML = `
            <div class="flex justify-between items-center mb-1">
              <span class="font-black text-lg text-slate-800">${log.empId}</span>
              <span class="${actionColor} px-2 py-1 rounded-md text-[10px] font-black uppercase tracking-wider">${log.action}</span>
            </div>
            <p class="text-slate-500 text-xs font-semibold mb-3">${log.time}</p>
            
            <div class="flex gap-2 mb-4">
              <a href="${log.photo}" target="_blank" class="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-700 text-center text-xs font-bold py-2 rounded-lg transition-all border border-slate-200">View Photo</a>
              <a href="https://www.google.com/maps/search/?api=1&query=${log.lat},${log.lng}" target="_blank" class="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-700 text-center text-xs font-bold py-2 rounded-lg transition-all border border-slate-200">View Map</a>
            </div>
            
            <div class="flex gap-2">
              <button onclick="updateStatus(this, ${log.row}, 'APPROVED')" class="flex-1 bg-emerald-500 text-white font-black text-sm py-3 rounded-lg hover:bg-emerald-600 shadow-md">APPROVE</button>
              <button onclick="updateStatus(this, ${log.row}, 'REJECTED')" class="flex-1 bg-rose-500 text-white font-black text-sm py-3 rounded-lg hover:bg-rose-600 shadow-md">REJECT</button>
            </div>
          `;
          container.appendChild(card);
        });
      });
    }

    function updateStatus(button, row, status) {
      const card = button.parentElement.parentElement;
      card.innerHTML = `<div class="flex justify-center items-center py-8"><svg class="w-6 h-6 animate-spin text-slate-400" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg></div>`;
      
      sendDataToGoogle({ action: 'UPDATE_STATUS', row: row, status: status }).then(res => {
        if (res.success) { fetchAdminLogs(); }
      });
    }
  </script>
</body>
</html>
